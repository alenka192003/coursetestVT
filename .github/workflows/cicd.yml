name: CI/CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy, for example v1.0.0"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  NAMESPACE: coursevt
  DEPLOYMENT: coursevt
  CONTAINER: coursevt

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    if: always() && needs.test.result == 'success' && (needs.build.result == 'success' || github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy metadata
        id: meta
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.image_tag }}"
          else
            version="${{ needs.build.outputs.version }}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if printf '%s' "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Kubeconfig decoded from base64"
          else
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
            echo "Kubeconfig written as plain YAML"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Apply manifests
        run: kubectl apply -k k8s

      - name: Update application image
        run: |
          kubectl -n "$NAMESPACE" set image deployment/"$DEPLOYMENT" "$CONTAINER"="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          kubectl -n "$NAMESPACE" set env deployment/"$DEPLOYMENT" APP_VERSION="${{ steps.meta.outputs.version }}"
          kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT" --timeout=120s
